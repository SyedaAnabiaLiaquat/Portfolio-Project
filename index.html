<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartify | Admin Login</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="login-container">
        <div class="bg-shape shape-1"></div>
        <div class="bg-shape shape-2"></div>
        <div class="bg-shape shape-3"></div>

        <div class="login-card">
            <div class="logo-section">
                <div class="logo">
                    <div class="logo-icon"><i class="fas fa-shopping-cart"></i></div>
                    <h1 class="logo-text">Cartify</h1>
                </div>
                <p class="tagline">Smart Shopping Experience</p>
            </div>

            <div class="welcome-section">
                <h2 class="welcome-title">Admin Login</h2>
                <p class="welcome-subtitle">Enter your credentials to manage the system</p>
            </div>

            <form class="login-form" id="loginForm" novalidate>
                <div class="form-group">
                    <label for="email" class="form-label"><i class="fas fa-envelope"></i> Email</label>
                    <div class="input-group">
                        <input type="email" class="form-input" id="email" placeholder="Enter Your Email" autocomplete="email">
                        <div class="input-icon"><i class="fas fa-envelope"></i></div>
                    </div>
                    <div class="error-message" id="emailError"></div>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label"><i class="fas fa-lock"></i> Password</label>
                    <div class="input-group">
                        <input type="password" class="form-input" id="password" placeholder="••••••••" autocomplete="current-password">
                        <div class="input-icon"><i class="fas fa-lock"></i></div>
                    </div>
                    <div class="error-message" id="passwordError"></div>
                </div>

                <div class="status-message" id="formStatus" role="status" aria-live="polite"></div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i>
                    <span id="loginBtnText">Login to Dashboard</span>
                    <div class="spinner" id="loginSpinner"></div>
                </button>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="successModal" aria-hidden="true">
        <div class="modal">
            <div class="modal-icon success">
                <i class="fa-regular fa-circle-check" aria-hidden="true"></i>
            </div>
            <h3 class="modal-title">Login Successful!</h3>
            <p class="modal-message">Welcome back, Admin. Redirecting to your dashboard...</p>
            <div class="modal-progress">
                <div class="progress-bar" id="progressBar"></div>
            </div>
        </div>
    </div>

    <script>
        // --- Supabase Config ---
        const SUPABASE_URL = "https://reaebmuoghlbfiwbvfdv.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_T74rSjgm3QpIMCSUg3Q_OQ_gvX984N8";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- Check if already logged in: login -> dashboard flow ---
        (function checkExistingSession() {
            const session = localStorage.getItem('admin_session');
            if (session) {
                window.location.replace('dashboard.html');
            }
        })();

        // --- Elements ---
        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const emailError = document.getElementById('emailError');
        const passwordError = document.getElementById('passwordError');
        const formStatus = document.getElementById('formStatus');
        const loginBtn = document.getElementById('loginBtn');
        const loginBtnText = document.getElementById('loginBtnText');
        const loginSpinner = document.getElementById('loginSpinner');
        const successModal = document.getElementById('successModal');
        const progressBar = document.getElementById('progressBar');

        function clearErrors() {
            emailError.textContent = '';
            emailError.classList.remove('show');
            passwordError.textContent = '';
            passwordError.classList.remove('show');
            formStatus.textContent = '';
            formStatus.className = 'status-message';
        }

        function setFieldError(el, msg) {
            el.textContent = msg;
            el.classList.add('show');
        }

        function setLoading(isLoading) {
            loginBtn.disabled = isLoading;
            loginBtnText.textContent = isLoading ? 'Logging in...' : 'Login to Dashboard';
            loginSpinner.classList.toggle('show', isLoading);
        }

        // Same success-modal + progress-bar animation used across the app,
        // now shared by the admin login before redirecting to the dashboard.
        function showSuccessAndRedirect(targetUrl) {
            successModal.classList.add('show');
            successModal.setAttribute('aria-hidden', 'false');
            // trigger the CSS width transition on the next frame
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    progressBar.style.width = '100%';
                });
            });
            setTimeout(() => {
                window.location.href = targetUrl;
            }, 1800);
        }

        // --- Login logic ---
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            clearErrors();

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            let hasError = false;
            if (!email) {
                setFieldError(emailError, 'Email is required');
                hasError = true;
            }
            if (!password) {
                setFieldError(passwordError, 'Password is required');
                hasError = true;
            }
            if (hasError) return;

            setLoading(true);

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) {
                    formStatus.classList.add('error');
                    if (error.message.includes("Invalid login credentials")) {
                        formStatus.textContent = 'Wrong email or password';
                    } else {
                        formStatus.textContent = 'Please check your network and try again';
                    }
                    setLoading(false);
                } else if (data.user) {
                    localStorage.setItem('admin_session', JSON.stringify({
                        id: data.user.id,
                        email: data.user.email
                    }));
                    formStatus.classList.add('success');
                    formStatus.textContent = 'Login Successful! Redirecting...';
                    showSuccessAndRedirect('dashboard.html');
                    // keep button disabled/spinning until redirect happens
                }
            } catch (err) {
                formStatus.classList.add('error');
                formStatus.textContent = 'Please check your network and try again';
                setLoading(false);
            }
        });
    </script>
</body>
</html>
